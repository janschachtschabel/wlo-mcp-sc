name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: build/test/audit only needs to read the repo. Without this
# block the job token inherits the org/repo default, which is often read/write.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to full commit SHAs (tag hijack protection); the tag is
      # kept as a comment for readability. Verified against the GitHub API.
      # v5 runs on the Node 24 action runtime — v4 targets the deprecated Node 20
      # runtime, which GitHub now force-migrates and warns about on every run.
      # NOTE: this is the runtime of the ACTIONS; `node-version` below is our
      # app's runtime and stays 20 (what package.json engines + the Docker image
      # declare), so CI keeps testing the runtime we actually ship.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Type gate over what the build project cannot see: api/ (Vercel entry),
      # tests/ (tsx strips types), and the widget DOM entry points (esbuild
      # does not type-check). See tsconfig.typecheck.json.
      - run: npm run typecheck
      - run: npm test
      # Gate on SHIPPED vulnerabilities: production dependency tree must be
      # free of high/critical advisories. Dev-only findings (e.g. the tsx →
      # esbuild dev-server chain, which is not shipped) are reported separately
      # and do not fail the build. See README "Sicherheit & Abhängigkeiten".
      - name: Audit production dependencies (gate)
        run: npm audit --omit=dev --audit-level=high
      - name: Audit full tree (informational)
        run: npm audit || true
